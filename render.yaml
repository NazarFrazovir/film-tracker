# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect repo → New Blueprint → select render.yaml
services:
  - type: web
    name: film-tracker
    runtime: docker
    plan: starter
    region: frankfurt
    healthCheckPath: /api/health
    disk:
      name: film-tracker-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        value: file:/data/prod.db
      - key: AUTH_SECRET
        generateValue: true
      - key: TMDB_API_KEY
        sync: false
      - key: TMDB_ACCESS_TOKEN
        sync: false
      - key: CLIENT_URL
        sync: false